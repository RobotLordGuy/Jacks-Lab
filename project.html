<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Project - Jack's Lab</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="logo" style="text-decoration:none;">Jack's Lab</a>
                <div class="nav-menu">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="index.html#projects" class="nav-link">Projects</a>
                </div>
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>

        <!-- Project content injected by JS -->
        <div id="project-root"></div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Jack's Lab. All rights reserved.</p>
        </footer>

        <script src="projects-data.js"></script>
        <script>
            // ===== MOBILE MENU =====
            const hamburger = document.getElementById('hamburger');
            const navMenu   = document.querySelector('.nav-menu');
            if (hamburger) {
                hamburger.addEventListener('click', () => {
                    navMenu.style.display = navMenu.style.display === 'flex' ? 'none' : 'flex';
                });
            }
            document.addEventListener('click', (e) => {
                if (navMenu && navMenu.style.display === 'flex' && !e.target.closest('nav')) {
                    navMenu.style.display = 'none';
                }
            });

            // ===== RENDER PROJECT =====
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = parseInt(urlParams.get('id'), 10);
            const project   = (typeof projects !== 'undefined') ? projects[projectId] : null;
            const root      = document.getElementById('project-root');

            if (!project) {
                root.innerHTML = `
                    <div class="proj-not-found">
                        <h2>Project not found.</h2>
                        <a href="index.html#projects" class="cta-button" style="margin-top:1.5rem;display:inline-block;">← Back to Projects</a>
                    </div>`;
            } else {
                document.title = `${project.title} - Jack's Lab`;

                const skillsHTML  = project.skills.map(s => `<span class="tag">${s}</span>`).join('');
                const detailsHTML = project.details.map(d => `
                    <div class="proj-detail-item">
                        <span class="proj-detail-label">${d.label}</span>
                        <span class="proj-detail-value">${d.value}</span>
                    </div>`).join('');

                const prevBtn = projectId > 0
                    ? `<a href="project.html?id=${projectId - 1}" class="proj-nav-btn">← Previous Project</a>`
                    : `<span></span>`;
                const nextBtn = projectId < projects.length - 1
                    ? `<a href="project.html?id=${projectId + 1}" class="proj-nav-btn">Next Project →</a>`
                    : `<span></span>`;

                root.innerHTML = `
                    <!-- Hero -->
                    <div class="proj-hero" style="background-image: url('${project.thumbnail}')">
                        <div class="proj-hero-overlay">
                            <div class="proj-hero-content">
                                <span class="proj-category-badge">${project.field}</span>
                                <h1>${project.title}</h1>
                                <p>${project.description}</p>
                            </div>
                        </div>
                    </div>

                    <!-- Body -->
                    <div class="proj-body">
                        <div class="proj-body-container">

                            <a href="index.html#projects" class="proj-back-btn">← Back to Projects</a>

                            <div class="proj-layout">

                                <!-- Main -->
                                <main class="proj-main">
                                    <img
                                        src="${project.thumbnail}"
                                        alt="${project.title}"
                                        class="proj-feature-img"
                                    >
                                    <div class="proj-about-card">
                                        <h2>About This Project</h2>
                                        <p>${project.longDescription}</p>
                                    </div>
                                </main>

                                <!-- Sidebar -->
                                <aside class="proj-sidebar">
                                    <div class="proj-info-card">
                                        <h3>Project Info</h3>
                                        <div class="proj-details-list">${detailsHTML}</div>
                                    </div>
                                    <div class="proj-info-card">
                                        <h3>Skills &amp; Tools</h3>
                                        <div class="project-tags" style="margin-top:0.25rem;">${skillsHTML}</div>
                                    </div>
                                    ${project.github ? `
                                    <div class="proj-info-card">
                                        <h3>Repository</h3>
                                        <a href="${project.github}" target="_blank" rel="noopener noreferrer" class="github-link-btn">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23A11.52 11.52 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.29-1.552 3.297-1.23 3.297-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
                                            </svg>
                                            View on GitHub
                                        </a>
                                    </div>` : ''}
                                    ${project.projectLink ? `
                                    <div class="proj-info-card">
                                        <h3>Link To Project</h3>
                                        <a href="${project.projectLink}" target="_blank" rel="noopener noreferrer" class="project-link-btn">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                                                <polyline points="15 3 21 3 21 9"/>
                                                <line x1="10" y1="14" x2="21" y2="3"/>
                                            </svg>
                                            Visit Project
                                        </a>
                                    </div>` : ''}
                                </aside>

                            </div><!-- /.proj-layout -->

                            <!-- Prev / Next -->
                            <div class="proj-pagination">
                                ${prevBtn}
                                ${nextBtn}
                            </div>

                        </div><!-- /.proj-body-container -->
                    </div><!-- /.proj-body -->
                `;
            }
        </script>
    </body>
</html>
